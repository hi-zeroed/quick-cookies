<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Cookies - Preview instantly. Edit seamlessly.</title>
    
    <!-- 引入 Outfit 与 Inter 字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050507;
            --accent-blue: #3b82f6;
            --accent-orange: #f97316;
            --text-main: #f5f5f7;
            --text-muted: #86868b;
            --font-display: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'Fira Code', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-sans);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 30px 24px;
            perspective: 1200px;
        }

        /* 极致发光的漂移双色极光背景 */
        .aurora-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            z-index: -2;
            background: #050507;
        }

        .aurora-glow-1 {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.18) 0%, transparent 70%);
            top: 15%;
            left: 10%;
            filter: blur(80px);
            animation: drift-1 25s infinite alternate ease-in-out;
        }

        .aurora-glow-2 {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(249, 115, 22, 0.12) 0%, transparent 70%);
            bottom: 15%;
            right: 10%;
            filter: blur(80px);
            animation: drift-2 20s infinite alternate ease-in-out;
        }

        @keyframes drift-1 {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(100px, 80px) scale(1.1); }
            100% { transform: translate(-50px, 120px) scale(0.9); }
        }

        @keyframes drift-2 {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-120px, -60px) scale(0.95); }
            100% { transform: translate(60px, -100px) scale(1.15); }
        }

        /* 顶部导航与精美双语开关 */
        header {
            width: 100%;
            max-width: 1100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo img {
            width: 40px;
            height: 40px;
            filter: drop-shadow(0 4px 10px rgba(59, 130, 246, 0.25));
        }

        .header-logo span {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 22px;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 双语药丸切换按钮 */
        .lang-switch {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 3px;
            display: flex;
            position: relative;
            cursor: pointer;
            width: 120px;
            height: 32px;
            user-select: none;
            transition: border-color 0.25s;
        }

        .lang-switch:hover {
            border-color: rgba(255, 255, 255, 0.16);
        }

        .lang-switch-slider {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 56px;
            height: 26px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 18px;
            transition: transform 0.25s cubic-bezier(0.25, 1, 0.5, 1);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .lang-switch.active .lang-switch-slider {
            transform: translateX(58px);
        }

        .lang-btn {
            flex: 1;
            text-align: center;
            line-height: 24px;
            font-size: 11.5px;
            font-weight: 600;
            color: var(--text-muted);
            z-index: 1;
            transition: color 0.25s;
        }

        .lang-switch.active .lang-btn-en {
            color: #fff;
        }

        .lang-switch:not(.active) .lang-btn-zh {
            color: #fff;
        }

        /* 主体视口 */
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            max-width: 800px;
            z-index: 10;
        }

        /* 物理弹簧 (Spring Physics) 级别交错飞入动效 */
        .spring-reveal {
            opacity: 0;
            transform: translateY(60px) scale(0.96);
            animation: springEntrance 1.2s cubic-bezier(0.25, 1.1, 0.5, 1.02) forwards;
        }

        /* 优雅渐显动效（适合 Header 与 Footer，免去过于激烈的移动） */
        .fade-reveal {
            opacity: 0;
            animation: fadeEntrance 1s ease-out forwards;
        }

        /* 交错延迟微调序列 (Stagger Delays) */
        .stagger-0 { animation-delay: 0s; }
        .stagger-1 { animation-delay: 0.06s; }
        .stagger-2 { animation-delay: 0.12s; }
        .stagger-3 { animation-delay: 0.18s; }
        .stagger-4 { animation-delay: 0.24s; }
        .stagger-5 { animation-delay: 0.30s; }
        .stagger-6 { animation-delay: 0.36s; }

        @keyframes springEntrance {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes fadeEntrance {
            to {
                opacity: 1;
            }
        }

        .tagline {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #60a5fa;
            margin-bottom: 16px;
            transition: opacity 0.2s;
        }

        h1 {
            font-family: var(--font-display);
            font-size: 68px;
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -2.5px;
            margin-bottom: 18px;
            background: linear-gradient(to right, #ffffff, #a5b4fc, #fdba74);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 80px rgba(99, 102, 241, 0.12);
            transition: opacity 0.2s;
        }

        .subtitle {
            font-size: 18px;
            color: var(--text-muted);
            max-width: 580px;
            margin-bottom: 36px;
            line-height: 1.5;
            font-weight: 400;
            transition: opacity 0.2s;
        }

        /* 0ms 交叉淡化切换 */
        .fade-out {
            opacity: 0 !important;
        }

        /* 流光扫光按键 */
        .cta-group {
            display: flex;
            gap: 16px;
            align-items: center;
            margin-bottom: 55px;
        }

        .btn {
            padding: 13px 32px;
            border-radius: 24px;
            font-size: 14.5px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue) 0%, #1d4ed8 100%);
            color: #fff;
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-primary::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 30%;
            height: 200%;
            background: linear-gradient(to right, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.2) 50%, rgba(255, 255, 255, 0) 100%);
            transform: rotate(25deg);
            animation: buttonSweep 4s infinite linear;
        }

        @keyframes buttonSweep {
            0% { left: -60%; }
            35% { left: 140%; }
            100% { left: 140%; }
        }

        .btn-primary:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.45);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-main);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.16);
            transform: translateY(-2px) scale(1.02);
        }

        /* 3D 浮空仿真窗口，配合微光旋转流彩边框 */
        .window-wrapper {
            position: relative;
            padding: 1px;
            border-radius: 13px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.02));
            box-shadow: 0 35px 75px rgba(0, 0, 0, 0.55);
            /* 多重动画串联：先执行 springEntrance 入场(延迟 0.30s)，待稳定后于 1.50s 瞬间启动 windowFloat 浮动 */
            opacity: 0;
            transform-style: preserve-3d;
            transform: rotateX(8deg) rotateY(-8deg);
            animation: 
                springEntrance 1.2s cubic-bezier(0.25, 1.1, 0.5, 1.02) 0.30s forwards,
                windowFloat 8s infinite ease-in-out 1.50s;
        }

        /* 卡片旋转彩虹边框流光（微动效） */
        .window-wrapper::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, transparent 40%, rgba(59, 130, 246, 0.3) 50%, rgba(249, 115, 22, 0.3) 60%, transparent 70%);
            background-size: 200% 200%;
            z-index: -1;
            border-radius: 15px;
            animation: borderGlow 6s infinite linear;
        }

        @keyframes borderGlow {
            0% { background-position: 0% 0%; }
            100% { background-position: 200% 200%; }
        }

        @keyframes windowFloat {
            0%, 100% { transform: rotateX(8deg) rotateY(-8deg) translateY(0); }
            50% { transform: rotateX(10deg) rotateY(-5deg) translateY(-6px); }
        }

        .mock-window {
            width: 440px;
            height: 180px;
            border-radius: 12px;
            background: rgba(18, 18, 22, 0.85);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .mock-header {
            height: 36px;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            align-items: center;
            padding: 0 14px;
            justify-content: space-between;
        }

        .traffic-lights {
            display: flex;
            gap: 6px;
        }

        .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
        }
        .red { background-color: #ff5f56; }
        .yellow { background-color: #ffbd2e; }
        .green { background-color: #27c93f; }

        .mock-filename {
            font-size: 11px;
            color: var(--text-muted);
            font-family: var(--font-mono);
            margin: 0 auto;
        }

        .mock-body {
            flex: 1;
            padding: 18px 24px;
            font-family: var(--font-sans);
            text-align: left;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: #cbd5e1;
        }

        .version-badge {
            align-self: flex-start;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 8px;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.35);
        }

        .version-desc {
            font-size: 11.5px;
            line-height: 1.6;
            color: #cbd5e1;
        }

        /* 页脚 */
        footer {
            z-index: 10;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            transition: opacity 0.2s;
        }

        footer a {
            color: rgba(255, 255, 255, 0.45);
            text-decoration: none;
            transition: color 0.2s;
        }

        footer a:hover {
            color: #fff;
        }
    </style>
</head>
<body>

    <!-- 极光背景 -->
    <div class="aurora-bg">
        <div class="aurora-glow-1"></div>
        <div class="aurora-glow-2"></div>
    </div>

    <!-- 顶部导航与双语切换 -->
    <header class="fade-reveal stagger-0">
        <div class="header-logo">
            <img src="logo.png" alt="Quick Cookies Logo">
            <span>Quick Cookies</span>
        </div>
        
        <!-- EN / 中文 滑块切换药丸 -->
        <div class="lang-switch" id="langSwitch" onclick="toggleLanguage()">
            <div class="lang-switch-slider"></div>
            <div class="lang-btn lang-btn-zh">中文</div>
            <div class="lang-btn lang-btn-en">EN</div>
        </div>
    </header>

    <!-- 主体视口 -->
    <main class="hero-container">
        <!-- 左侧文本排版 -->
        <div class="hero-content">
            <div class="tagline spring-reveal stagger-1" data-i18n="tagline">极速无感文件预览/编辑</div>
            <h1 class="spring-reveal stagger-2" data-i18n="title">秒开，无缝，极简。</h1>
            <p class="subtitle spring-reveal stagger-3" data-i18n="desc">双击 Option 瞬间呼出。为 macOS 深度定制的卡片式文件预览与快捷编辑工具。</p>
            
            <div class="cta-group spring-reveal stagger-4">
                <a href="https://github.com/your-username/QuickPeek/releases" class="btn btn-primary">
                    <svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
                        <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/>
                    </svg>
                    <span data-i18n="download">下载 .DMG</span>
                </a>
                <a href="https://github.com/your-username/QuickPeek" class="btn btn-secondary" target="_blank">
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16" style="margin-right: 2px;">
                        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
                    </svg>
                    <span data-i18n="github">GitHub 仓库</span>
                </a>
            </div>
        </div>

        <!-- 右侧仿真卡片 -->
        <div class="hero-visual spring-reveal stagger-5">
            <div class="window-wrapper">
                <div class="mock-window">
                    <div class="mock-header">
                        <div class="traffic-lights">
                            <div class="dot red"></div>
                            <div class="dot yellow"></div>
                            <div class="dot green"></div>
                        </div>
                        <div class="mock-filename" data-i18n="versionTitle">新版本已发布</div>
                        <div style="width: 33px;"></div>
                    </div>
                    <div class="mock-body">
                        <div class="version-badge">v1.2.0</div>
                        <div class="version-desc" data-i18n="versionInfo">
                            🎉 优化 PDF/Office 圆角渲染与无界毛玻璃裁切<br>
                            🚀 导出 Markdown 到 PDF 支持实时进度指示与顶层 Toast 提示<br>
                            ✨ 深度适配 macOS 系统的明暗模式与中文本地化
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="fade-reveal stagger-6" data-i18n="footer">
        &copy; 2026 Quick Cookies. 以 MIT 协议开源。图标源自 Remix Icon。
    </footer>

    <!-- 多语言热刷新脚本 -->
    <script>
        const i18n = {
            zh: {
                tagline: "极速无感文件预览/编辑",
                title: "秒开，无缝，极简。",
                desc: "双击 Option 瞬间呼出。为 macOS 深度定制的卡片式文件预览与快捷编辑工具。",
                download: "下载 .DMG",
                github: "GitHub 仓库",
                versionTitle: "新版本已发布",
                versionInfo: "🎉 优化 PDF/Office 圆角渲染与无界毛玻璃裁切<br>🚀 导出 Markdown 到 PDF 支持实时进度指示与顶层 Toast 提示<br>✨ 深度适配 macOS 系统的明暗模式与中文本地化",
                footer: "&copy; 2026 Quick Cookies. 以 <a href=\"https://github.com/your-username/QuickPeek/blob/main/LICENSE\" target=\"_blank\">MIT</a> 协议开源。图标源自 <a href=\"https://remixicon.com/\" target=\"_blank\">Remix Icon</a>。"
            },
            en: {
                tagline: "Ultra-fast File Preview & Edit",
                title: "Preview instantly. Edit seamlessly.",
                desc: "Double-click Option to reveal. A card-style file preview and quick editor tailored for macOS.",
                download: "Download .DMG",
                github: "GitHub Repo",
                versionTitle: "New Version Released",
                versionInfo: "🎉 Refined PDF/Office borderless rendering with transparent mask crop<br>🚀 Live export progress indicator for Markdown-to-PDF pipeline<br>✨ Adaptive dark/light theme switching with native Chinese locale Support",
                footer: "&copy; 2026 Quick Cookies. Licensed under <a href=\"https://github.com/your-username/QuickPeek/blob/main/LICENSE\" target=\"_blank\">MIT</a>. Icons by <a href=\"https://remixicon.com/\" target=\"_blank\">Remix Icon</a>."
            }
        };

        let currentLang = 'zh';

        function toggleLanguage() {
            const langSwitch = document.getElementById('langSwitch');
            const targetLang = currentLang === 'zh' ? 'en' : 'zh';
            
            // 激活滑块偏移
            if (targetLang === 'en') {
                langSwitch.classList.add('active');
            } else {
                langSwitch.classList.remove('active');
            }
            
            currentLang = targetLang;
            
            // 执行 0ms Crossfade 动画热刷新文字
            const elements = document.querySelectorAll('[data-i18n]');
            elements.forEach(el => {
                el.classList.add('fade-out');
            });

            setTimeout(() => {
                // 替换文字
                elements.forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (i18n[currentLang][key]) {
                        el.innerHTML = i18n[currentLang][key];
                    }
                    el.classList.remove('fade-out');
                });
            }, 180);
        }
    </script>
</body>
</html>
