name: Build and Release DMG

on:
  push:
    tags:
      - 'v*'  # 当推送格式为 v1.2.0 等 v* 形式的 tag 时触发构建

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-26  # 使用 macOS 26 arm64 runner，贴近本地 Xcode 26 构建环境

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Print Build Environment
        run: |
          sw_vers
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-version

      - name: Build macOS App (Unsigned)
        run: |
          xcodebuild -project QuickCookies.xcodeproj \
                     -scheme QuickCookies \
                     -configuration Release \
                     -derivedDataPath ./derived_data \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO \
                     clean build

      - name: Copy Highlightr Static Resources
        run: |
          APP_PATH="./derived_data/Build/Products/Release/QuickCookies.app"
          HIGHLIGHTR_BUNDLE_RESOURCES="$APP_PATH/Contents/Resources/Highlightr_Highlightr.bundle/Contents/Resources"
          if [ -d "$HIGHLIGHTR_BUNDLE_RESOURCES" ]; then
            cp -R "$HIGHLIGHTR_BUNDLE_RESOURCES/"* "$APP_PATH/Contents/Resources/"
            echo "Highlightr resources copied successfully."
          else
            echo "Warning: Highlightr.bundle not found."
          fi
          echo "Highlightr bundle files: $(find "$HIGHLIGHTR_BUNDLE_RESOURCES" -type f | wc -l | tr -d ' ')"
          stat -f "highlight.min.js bytes: %z" "$APP_PATH/Contents/Resources/highlight.min.js"
          stat -f "atom-one-dark.min.css bytes: %z" "$APP_PATH/Contents/Resources/atom-one-dark.min.css"
          /usr/libexec/PlistBuddy -c 'Print :DTXcode' "$APP_PATH/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c 'Print :DTSDKName' "$APP_PATH/Contents/Info.plist"

      - name: Ad-hoc Force Sign App & Extension
        run: |
          APP_PATH="./derived_data/Build/Products/Release/QuickCookies.app"
          ENTITLEMENTS_PATH="./QuickCookies/QuickCookies.entitlements"
          
          # 1. 强制对内置的 Finder Sync 插件进行 Ad-hoc 覆盖签名
          codesign --force --deep --sign - --entitlements "$ENTITLEMENTS_PATH" "$APP_PATH/Contents/PlugIns/QuickCookiesFinderSync.appex"
          
          # 2. 强制对主应用进行 Ad-hoc 覆盖签名
          codesign --force --deep --sign - --entitlements "$ENTITLEMENTS_PATH" "$APP_PATH"
          
          # 3. 校验签名状态
          codesign -vvv --deep --display "$APP_PATH"
          codesign -d --entitlements :- "$APP_PATH"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Pack App to DMG
        run: |
          mkdir -p ./release_dist
          mkdir -p ./dmg_source
          
          # 仅将自签名完毕的 App 本体复制到专属源文件夹中
          cp -R "./derived_data/Build/Products/Release/QuickCookies.app" ./dmg_source/
          
          # 检查打包所用图标是否存在，如不存在则使用应用内置 icns
          ICON_PATH="./QuickCookies/Resources/Assets.xcassets/AppIcon.appiconset/AppIcon.icns"
          if [ ! -f "$ICON_PATH" ]; then
            ICON_PATH="./dmg_source/QuickCookies.app/Contents/Resources/AppIcon.icns"
          fi
          
          create-dmg \
            --volname "Quick Cookies" \
            --volicon "$ICON_PATH" \
            --window-size 500 340 \
            --icon-size 90 \
            --icon "QuickCookies.app" 130 110 \
            --hide-extension "QuickCookies.app" \
            --app-drop-link 370 110 \
            "./release_dist/QuickCookies-macOS.dmg" \
            ./dmg_source/

      - name: Auto Create GitHub Release and Upload DMG
        uses: softprops/action-gh-release@v2
        with:
          files: ./release_dist/QuickCookies-macOS.dmg
          generate_release_notes: true
          body: |
            # Quick Cookies Release

            ## Install
            
            ```bash
            brew tap hi-zeroed/tap
            brew install --cask quick-cookies
            ```

            ## First Launch

            QuickCookies is currently distributed without Apple notarization. If macOS blocks the first launch, follow the manual installation notes in the README.

            - 简体中文: https://github.com/hi-zeroed/quick-cookies/blob/main/README-cn.md
            - English: https://github.com/hi-zeroed/quick-cookies/blob/main/README.md

            ---
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew Tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "未检测到 TAP_GITHUB_TOKEN 密钥，跳过 Homebrew Tap 自动更新。/ TAP_GITHUB_TOKEN secret not found. Skipping."
            exit 0
          fi
          
          # 1. 计算 DMG 文件的 SHA256 校验和
          SHA256_HASH=$(shasum -a 256 "./release_dist/QuickCookies-macOS.dmg" | awk '{print $1}')
          TAG_NAME="${{ github.ref_name }}"
          VERSION="${TAG_NAME#v}" # 去除 v 前缀，如 v1.0.0 -> 1.0.0
          
          # 2. 临时克隆自建的 homebrew-tap 仓库 (使用 PAT 鉴权)
          git clone https://x-access-token:$TAP_TOKEN@github.com/hi-zeroed/homebrew-tap.git ./homebrew_tap_temp
          
          # 3. 替换或自动初始化 Casks/quick-cookies.rb
          CASK_PATH="./homebrew_tap_temp/Casks/quick-cookies.rb"
          mkdir -p "./homebrew_tap_temp/Casks"
          
          if [ ! -f "$CASK_PATH" ]; then
            echo 'cask "quick-cookies" do' > "$CASK_PATH"
            echo '  version ""' >> "$CASK_PATH"
            echo '  sha256 ""' >> "$CASK_PATH"
            echo '' >> "$CASK_PATH"
            echo '  url "https://github.com/hi-zeroed/quick-cookies/releases/download/v#{version}/QuickCookies-macOS.dmg"' >> "$CASK_PATH"
            echo '  name "Quick Cookies"' >> "$CASK_PATH"
            echo '  desc "Instant code and document preview tool for macOS Finder"' >> "$CASK_PATH"
            echo '  homepage "https://github.com/hi-zeroed/quick-cookies"' >> "$CASK_PATH"
            echo '' >> "$CASK_PATH"
            echo '  app "QuickCookies.app"' >> "$CASK_PATH"
            echo '' >> "$CASK_PATH"
            echo '  zap trash: [' >> "$CASK_PATH"
            echo '    "~/Library/Application Support/com.quickcookies.app",' >> "$CASK_PATH"
            echo '    "~/Library/Preferences/com.quickcookies.app.plist",' >> "$CASK_PATH"
            echo '  ]' >> "$CASK_PATH"
            echo 'end' >> "$CASK_PATH"
          fi
          
          # 使用 perl 跨平台安全正则替换 version 和 sha256
          perl -pi -e "s/version \".*\"/version \"$VERSION\"/g" "$CASK_PATH"
          perl -pi -e "s/sha256 \".*\"/sha256 \"$SHA256_HASH\"/g" "$CASK_PATH"
          
          # 4. 提交并推送修改到 homebrew-tap 仓库
          cd ./homebrew_tap_temp
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/quick-cookies.rb
          
          # 若无实际内容变化则跳过 commit 防止报错
          if git diff --staged --quiet; then
            echo "Cask 脚本内容无任何实质改变，跳过推送。/ No changes in Cask. Skipping push."
          else
            git commit -m "Update quick-cookies to v$VERSION"
            git push origin main
          fi
